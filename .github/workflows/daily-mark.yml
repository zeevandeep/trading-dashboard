name: Daily Mark-to-Market

on:
  schedule:
    # 12:30 UTC = 6:00 PM IST, Mon-Fri
    - cron: "30 12 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  mark:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Paper trading mark-to-market
        run: python scripts/daily_mark.py || echo "::warning::Paper mark failed"

      - name: Live trading mark-to-market
        run: python scripts/daily_live_mark.py || echo "::warning::Live mark failed"

      - name: Refresh V+Q scores
        run: python scripts/refresh_vq_scores.py || echo "::warning::V+Q refresh failed"

      - name: Push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper/ data/live/ data/vq_scores_latest.json || true
          if git diff --cached --quiet; then
            echo "No data changes to push."
          else
            git commit -m "Daily mark-to-market $(date +%Y-%m-%d)"
            git push
          fi

      - name: Send Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            python scripts/telegram_summary.py
          else
            python -c "
          import os, urllib.request, urllib.parse
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          url = f'https://api.telegram.org/bot{token}/sendMessage'
          data = urllib.parse.urlencode({'chat_id': chat_id, 'text': '🔴 Daily mark-to-market FAILED.\nCheck: github.com/zeevandeep/trading-dashboard/actions', 'parse_mode': 'Markdown'}).encode()
          urllib.request.urlopen(urllib.request.Request(url, data=data))
          "
          fi
