name: Bedrock Quarterly Paper Rebalance

on:
  schedule:
    # 13:30 UTC = 7:00 PM IST, on 28th of Mar/Jun/Sep/Dec
    - cron: "30 13 28 3,6,9,12 *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Run Bedrock paper rebalance
        run: python main.py paper -c configs/value_quality_v1.yaml

      - name: Generate factsheet
        run: python scripts/generate_factsheet.py value_quality_v1

      - name: Upload factsheet
        uses: actions/upload-artifact@v4
        with:
          name: bedrock-factsheet
          path: outputs/factsheets/bedrock_*.pdf

      - name: Push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper/ || true
          if git diff --cached --quiet; then
            echo "No data changes to push."
          else
            git commit -m "Bedrock quarterly paper rebalance $(date +%Y-%m-%d)"
            git fetch origin main
            git rebase origin/main
            git push
          fi

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python -c "
          import glob, os, urllib.request, urllib.parse
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          status = os.environ['JOB_STATUS']
          icon = '🟢' if status == 'success' else '🔴'
          msg = f'{icon} Bedrock quarterly rebalance: {status.upper()}'
          # Send text
          url = f'https://api.telegram.org/bot{token}/sendMessage'
          data = urllib.parse.urlencode({'chat_id': chat_id, 'text': msg}).encode()
          urllib.request.urlopen(urllib.request.Request(url, data=data))
          # Send PDF if exists
          pdfs = glob.glob('outputs/factsheets/bedrock_*.pdf')
          if pdfs and status == 'success':
              import http.client, mimetypes, uuid
              boundary = uuid.uuid4().hex
              pdf_path = pdfs[0]
              with open(pdf_path, 'rb') as f:
                  pdf_data = f.read()
              fname = os.path.basename(pdf_path)
              body = (
                  f'--{boundary}\r\nContent-Disposition: form-data; name=\"chat_id\"\r\n\r\n{chat_id}\r\n'
                  f'--{boundary}\r\nContent-Disposition: form-data; name=\"document\"; filename=\"{fname}\"\r\n'
                  f'Content-Type: application/pdf\r\n\r\n'
              ).encode() + pdf_data + f'\r\n--{boundary}--\r\n'.encode()
              req = urllib.request.Request(
                  f'https://api.telegram.org/bot{token}/sendDocument',
                  data=body,
                  headers={'Content-Type': f'multipart/form-data; boundary={boundary}'}
              )
              urllib.request.urlopen(req)
          "
