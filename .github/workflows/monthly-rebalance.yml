name: Ascent Monthly Paper Rebalance

on:
  schedule:
    # 13:00 UTC = 6:30 PM IST, on the 28th of every month
    - cron: "0 13 28 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Ascent paper rebalance
        run: python main.py paper -c configs/smallcap_momentum_v2.yaml

      - name: Push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper/ || true
          if git diff --cached --quiet; then
            echo "No data changes to push."
          else
            git commit -m "Ascent monthly paper rebalance $(date +%Y-%m-%d)"
            git fetch origin main
            git rebase origin/main
            git push
          fi

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python -c "
          import os, urllib.request, urllib.parse
          status = os.environ['JOB_STATUS']
          icon = '🟢' if status == 'success' else '🔴'
          msg = f'{icon} Ascent monthly rebalance: {status.upper()}'
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          url = f'https://api.telegram.org/bot{token}/sendMessage'
          data = urllib.parse.urlencode({'chat_id': chat_id, 'text': msg}).encode()
          urllib.request.urlopen(urllib.request.Request(url, data=data))
          "
