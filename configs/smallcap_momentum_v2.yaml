# Strategy: Indian Smallcap Monthly Momentum v2 (NO TREND FILTER)
#
# Philosophy: Pure 12-1 cross-sectional momentum on NSE 500 ex Nifty 50.
# Monthly rebalance, top 15 names equal weight.
#
# Decision rationale (2026-04-26):
# Robustness testing showed the 200-day SMA trend filter on Nifty 50
# REDUCED CAGR from 31.6% to 23.2% while only improving max DD from
# -34.6% to -32.4%. The filter whipsawed in choppy years and missed
# V-shaped recoveries (most notably March 2020). Indian smallcaps don't
# decline smoothly enough for a slow trend filter to add value, and the
# momentum signal itself self-cleanses by ranking stocks on 12-month
# returns. We drop the filter and accept ~2.3 pp more drawdown for ~8 pp
# more CAGR.
#
# This is the OPERATING config going forward.
# v1 is kept as a historical reference (with filter on).

name: smallcap_momentum_v2

data:
  start: "2010-01-01"
  end: null  # null = through today

universe:
  mode: nse500_ex_nifty50  # options: nse500_ex_nifty50 | nse500 | nifty50

signal:
  type: momentum_n_m
  lookback_months: 12
  skip_months: 1  # J-T "12-1" — skip most recent month to avoid short-term reversal

trend_filter:
  enabled: false           # DISABLED — see rationale above
  benchmark_for_filter: "^NSEI"
  sma_window: 200

portfolio:
  top_n: 15
  rebalance_freq: "ME"  # M = month-end; options: W-FRI, ME, QE, YE
  weighting: equal

benchmark:
  symbol: "^NSEI"  # Nifty 50 — for performance comparison only
  name: "Nifty 50"

costs:
  # Slippage: 30 bps per side for smallcaps (conservative)
  slippage_per_side: 0.003

risk_free_rate: 0.06  # 6% — approximate India 10Y yield for Sharpe

initial_capital: 1.0  # unit equity — results expressed as multiples

# Notes on assumptions
notes:
  - "Universe is static (survivorship bias — top NSE 500 as of 2024)."
  - "Prices are adjusted close (splits, dividends)."
  - "Fills assumed at close of rebalance day; no intraday modeling."
  - "No trend filter — fully invested at all times."
  - "F&O not modeled. Options, leverage, pledging all out of scope."
